<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Voxel Planetarium</title>
  <script>
    // Recover from cached index.html pointing at deleted hashed asset bundles.
    window.addEventListener('error', (event) => {
      const target = event.target;
      if (!target || target.tagName !== 'SCRIPT' || !target.src) return;
      if (!target.src.includes('/Project_Zorg/assets/index-')) return;
      if (sessionStorage.getItem('pz-asset-reload')) return;
      sessionStorage.setItem('pz-asset-reload', '1');
      window.location.reload();
    }, true);
  </script>
</head>
<body>
  <div id="ui">
    <h1>Voxel Planetarium</h1>
    <p id="loading">Loading solar system…</p>
    <p id="hint">Drag to orbit · Double-click a planet to focus · Scroll to zoom</p>
    <p id="body-label"></p>
  </div>
  <div id="crosshair" hidden aria-hidden="true"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
